name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run generate
      - name: check generated types are in sync with the vendored spec
        run: git diff --exit-code src/generated.ts || (echo "src/generated.ts out of sync — run 'npm run generate' and commit" && exit 1)
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run test
      - run: npm run build
